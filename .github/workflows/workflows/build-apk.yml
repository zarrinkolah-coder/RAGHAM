name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Find Android project
        id: project
        shell: bash
        run: |
          SETTINGS_FILE="$(find . -maxdepth 5 -type f \( -name settings.gradle -o -name settings.gradle.kts \) | head -n 1)"
          if [ -z "$SETTINGS_FILE" ]; then
            echo "settings.gradle was not found. Extract the project ZIP and upload its contents."
            exit 1
          fi
          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Android project: $PROJECT_DIR"
          find "$PROJECT_DIR" -maxdepth 3 -type f | sort

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Build debug APK and save full log
        id: gradle_build
        shell: bash
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: |
          set +e
          gradle --no-daemon --stacktrace --info assembleDebug 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"
          STATUS=${PIPESTATUS[0]}
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragham-build-log
          path: gradle-build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload APK
        if: steps.gradle_build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: ragham-android-debug-apk
          path: ${{ steps.project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Mark build as failed
        if: steps.gradle_build.outputs.status != '0'
        shell: bash
        run: |
          echo "Android build failed. Download the ragham-build-log artifact and inspect the final FAILURE section."
          exit 1
