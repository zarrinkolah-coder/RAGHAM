بالای صفحه روی Actions بزنید.

از ستون سمت چپ، گردش‌کار Build Android APK را انتخاب کنید.

روی Run workflow بزنید و دوباره اجرای آن را تأیید کنید. گردش‌کارهایی که workflow_dispatch دارند از همین بخش دستی اجرا می‌شوند. 

چند دقیقه صبر کنید تا کنار اجرای جدید علامت سبز ظاهر شود.

