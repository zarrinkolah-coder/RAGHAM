name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت فایل‌های پروژه
        uses: actions/checkout@v4

      - name: پیدا کردن پوشه پروژه اندروید
        id: project
        shell: bash
        run: |
          SETTINGS_FILE="$(find . -maxdepth 4 -type f \( -name settings.gradle -o -name settings.gradle.kts \) | head -n 1)"
          if [ -z "$SETTINGS_FILE" ]; then
            echo "فایل settings.gradle پیدا نشد. فایل‌های پروژه باید از ZIP خارج و در مخزن بارگذاری شوند."
            echo "ساختار مورد انتظار: app/ ، build.gradle و settings.gradle"
            exit 1
          fi
          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Android project found in: $PROJECT_DIR"
          find "$PROJECT_DIR" -maxdepth 2 -type f | sort

      - name: نصب Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: نصب Android SDK
        uses: android-actions/setup-android@v3

      - name: نصب بسته‌های Android
        shell: bash
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: نصب Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: ساخت APK آزمایشی
        working-directory: ${{ steps.project.outputs.project_dir }}
        run: gradle --stacktrace assembleDebug

      - name: نمایش فایل APK ساخته‌شده
        shell: bash
        run: find "${{ steps.project.outputs.project_dir }}" -type f -name "*.apk" -print

      - name: ذخیره APK برای دانلود
        uses: actions/upload-artifact@v4
        with:
          name: ragham-android-debug-apk
          path: ${{ steps.project.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
